<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Chain Disruption Triage · AIP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#F4F3F0;color:#1a1a1a;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* TOP BAR */
.bar{height:44px;background:#fff;border-bottom:1px solid #e8e8e6;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.bar-logo{font-size:11px;font-weight:700;color:#1a1a1a;letter-spacing:.5px;opacity:.5}
.bar-sep{color:#ccc;font-size:16px}
.bar-title{font-size:12px;color:#555;font-weight:400}
.bar-pill{margin-left:auto;font-size:10px;background:#EEF2FF;color:#4338CA;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.3px}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden}

/* LEFT */
.left{width:256px;background:#fff;border-right:1px solid #e8e8e6;display:flex;flex-direction:column;flex-shrink:0}
.left-head{padding:12px 14px 10px;border-bottom:1px solid #f0f0ee}
.left-eyebrow{font-size:9px;font-weight:700;color:#aaa;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.left-subtitle{font-size:11px;color:#888}
.alerts{overflow-y:auto;flex:1}
.alert-row{padding:11px 14px;border-bottom:1px solid #f5f5f3;cursor:pointer;transition:background .1s;position:relative}
.alert-row:hover{background:#fafaf8}
.alert-row.sel{background:#F0F0FF;border-left:3px solid #5B4FE8}
.alert-row.sel .a-title{color:#3730A3}
.a-title{font-size:11.5px;font-weight:500;line-height:1.4;margin-bottom:5px;color:#222}
.a-meta{display:flex;align-items:center;gap:5px}
.a-region{font-size:10px;color:#888;background:#f5f5f3;padding:2px 6px;border-radius:3px;border:1px solid #ebebea}
.a-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.d-crit{background:#D92D20}.d-med{background:#F79009}.d-low{background:#17B26A}

/* RIGHT */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#bbb}
.empty-icon{font-size:28px;opacity:.4}
.empty-msg{font-size:12px}

/* ALERT BANNER */
.banner{padding:10px 16px;background:#fff;border-bottom:1px solid #e8e8e6;display:flex;align-items:center;gap:10px;flex-shrink:0}
.b-headline{flex:1;font-size:12.5px;font-weight:500;color:#1a1a1a}
.b-badge{font-size:10px;font-weight:600;background:#FEF3F2;color:#B42318;padding:3px 10px;border-radius:20px;white-space:nowrap;border:1px solid #FECDCA}
.run-btn{background:#5B4FE8;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap;letter-spacing:.2px;transition:background .15s}
.run-btn:hover{background:#4338CA}
.run-btn:disabled{background:#A5B4FC;cursor:not-allowed}

/* CONTENT AREA */
.content{flex:1;overflow-y:auto;padding:16px}

/* ALERT BODY */
.body-card{background:#fff;border:1px solid #e8e8e6;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.body-label{font-size:9px;font-weight:700;color:#aaa;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.body-text{font-size:12px;color:#555;line-height:1.65}

/* STATS */
.stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e8e8e6;border-radius:8px;padding:10px 14px;min-width:110px}
.stat-label{font-size:9px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.stat-num{font-size:24px;font-weight:500;color:#1a1a1a;line-height:1}
.stat-num.r{color:#B42318}

/* TABLE */
.tbl-wrap{background:#fff;border:1px solid #e8e8e6;border-radius:8px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:7px 12px;font-size:9.5px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #f0f0ee;background:#fafaf8}
.tbl td{padding:10px 12px;border-bottom:1px solid #f7f7f5;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafaf8}
.shp{font-weight:700;color:#185FA5;font-size:11px;letter-spacing:.3px}
.loc{font-size:11px;color:#888}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.act{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;border:1px solid transparent}

/* SEVERITY */
.s9{background:#FEF3F2;color:#B42318}.s8{background:#FFF4ED;color:#C4320A}
.s7{background:#FFFAEB;color:#B54708}.s6{background:#FFFAEB;color:#B54708}
.s5{background:#F0FDF4;color:#166534}.slow{background:#ECFDF5;color:#065F46}

/* ACTION */
.areroute{background:#FEF3F2;color:#B42318;border-color:#FECDCA}
.acoordinate{background:#FFF4ED;color:#C4320A;border-color:#F9DBAF}
.ahold{background:#FFFAEB;color:#B54708;border-color:#FEDF89}
.amonitor{background:#F0FDF4;color:#166534;border-color:#A7F3D0}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;gap:12px}
.spin{width:22px;height:22px;border:2px solid #e8e8e6;border-top-color:#5B4FE8;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-msg{font-size:11px;color:#aaa}
.no-affected{padding:40px;text-align:center;color:#aaa;font-size:12px}
</style>
</head>

let sel=null;

function sc(s){return s===9?'s9':s===8?'s8':s===7?'s7':s===6?'s6':s===5?'s5':'slow'}
function ac(t){return 'a'+t}
function sl(s){return s===9?'Critical':s>=7?'High':s===6?'Medium':s===5?'Moderate':'Low'}

function init(){
  document.getElementById('alerts').innerHTML=ALERTS.map((a,i)=>`
    <div class="alert-row" id="ar${i}" onclick="pick(${i})">
      <div class="a-title">${a.headline}</div>
      <div class="a-meta">
        <div class="a-dot d-${a.sev==='crit'?'crit':a.sev==='med'?'med':'low'}"></div>
        <span class="a-region">${a.region}</span>
      </div>
    </div>`).join('');
}

function pick(i){
  document.querySelectorAll('.alert-row').forEach(e=>e.classList.remove('sel'));
  document.getElementById('ar'+i).classList.add('sel');
  sel=ALERTS[i];
  document.getElementById('emptyState').style.display='none';
  const tp=document.getElementById('triagePanel');
  tp.style.display='flex';
  tp.style.flexDirection='column';
  tp.style.flex='1';
  tp.style.overflow='hidden';
  document.getElementById('bHead').textContent=sel.headline;
  document.getElementById('bBadge').textContent='⚠ '+sel.region;
  document.getElementById('runBtn').disabled=false;
  document.getElementById('content').innerHTML=`
    <div class="body-card">
      <div class="body-label">Alert details</div>
      <div class="body-text">${sel.body}</div>
    </div>`;
}

async function runTriage(){
  if(!sel)return;
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='Running…';
  document.getElementById('content').innerHTML=`<div class="loading"><div class="spin"></div><div class="spin-msg">AIP reasoning over affected shipments…</div></div>`;

  const affected=SHIPMENTS.filter(s=>s.current_region===sel.region);
  if(!affected.length){
    document.getElementById('content').innerHTML=`<div class="no-affected">No shipments currently in ${sel.region}.</div>`;
    btn.disabled=false;btn.textContent='Run Triage';return;
  }

  const ctx=affected.map(s=>`${s.shipment_id} | ${s.cargo} | $${parseInt(s.cargo_value_usd).toLocaleString()} | ETA ${s.eta_days}d | ${s.status} | ${s.current_location}`).join('\n');

  const prompt=`You are a supply chain triage AI for Palantir AIP.

Disruption: ${sel.headline}
Region: ${sel.region}
Details: ${sel.body}

Shipments in ${sel.region}:
${ctx}

For EACH shipment above, reason about impact severity and assign a recommended action.

Return ONLY valid JSON, no other text:
{"shipments":[{"id":"SHP-XXXX","cargo":"...","value":000000,"eta":0,"status":"...","location":"...","severity":9,"action":"specific actionable recommendation","actionType":"reroute"}]}

actionType must be exactly: reroute, coordinate, hold, or monitor
severity 9=Critical 7-8=High 6=Medium 5=Moderate 1-4=Low
Consider: cargo value (higher=more critical), ETA (shorter=more urgent), status (Customs Hold=more complex), disruption type`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const txt=d.content[0].text.replace(/```json/g,'').replace(/```/g,'').trim();
    const parsed=JSON.parse(txt);
    render(parsed.shipments);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="no-affected">Error: ${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent='Run Triage';
}

function render(rows){
  if(!rows||!rows.length){document.getElementById('content').innerHTML=`<div class="no-affected">No affected shipments found.</div>`;return;}
  const sorted=[...rows].sort((a,b)=>b.severity-a.severity);
  const total=sorted.length,crit=sorted.filter(r=>r.severity===9).length,rer=sorted.filter(r=>r.actionType==='reroute').length,mon=sorted.filter(r=>r.actionType!=='reroute').length;
  document.getElementById('content').innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-label">Shipments affected</div><div class="stat-num">${total}</div></div>
      <div class="stat"><div class="stat-label">Critical (sev 9)</div><div class="stat-num r">${crit}</div></div>
      <div class="stat"><div class="stat-label">Requiring reroute</div><div class="stat-num r">${rer}</div></div>
      <div class="stat"><div class="stat-label">Monitoring / hold</div><div class="stat-num">${mon}</div></div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr>
          <th>Shipment</th><th>Region</th><th>Cargo</th><th>Severity</th><th>Recommended Action</th>
        </tr></thead>
        <tbody>${sorted.map(r=>`
          <tr>
            <td><span class="shp">${r.id}</span><br><span class="loc">${r.location||''}</span></td>
            <td>${sel.region}</td>
            <td>${r.cargo}<br><span class="loc">$${parseInt(r.value||0).toLocaleString()} · ETA ${r.eta}d</span></td>
            <td><span class="badge ${sc(r.severity)}">${r.severity} — ${sl(r.severity)}</span></td>
            <td><span class="act ${ac(r.actionType)}">${r.action}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

init();
</script>
